name: rag-platform-prod

# Production compose for Guillaume7625/rag-platform on OVH VPS-1 (8 Go RAM).
# Contract:
#   - Secrets live at /etc/rag-platform/secrets.env (chmod 600, owned by root).
#   - Only Caddy exposes ports (80/443) to the public; everything else is on
#     the internal docker network.
#   - Embeddings + reranking are served by Voyage AI; generation by Anthropic.
#     No ML model runs inside this compose — fits comfortably in 8 Go RAM.
#
# Usage:
#   docker compose -f infra/prod/docker-compose.prod.yml \
#                  --env-file /etc/rag-platform/secrets.env \
#                  up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768M

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 192M

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1536M

  minio:
    image: minio/minio:latest
    container_name: rag_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [backend]
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set none local/${MINIO_BUCKET} || true;
      exit 0;
      "
    restart: "no"

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.prod
    image: rag-platform/api:latest
    container_name: rag_api
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      API_PORT: "8000"
      ROOT_PATH: /api
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: "1440"
      LLM_PROVIDER: anthropic
      LLM_SMALL_MODEL: ${LLM_SMALL_MODEL:-claude-haiku-4-5-20251001}
      LLM_LARGE_MODEL: ${LLM_LARGE_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      EMBEDDING_PROVIDER: voyage
      EMBEDDING_MODEL: ${VOYAGE_EMBEDDING_MODEL:-voyage-3}
      EMBEDDING_DIM: "1024"
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-cohere}
      RERANKER_MODEL: ${RERANKER_MODEL:-rerank-v3.5}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      RETRIEVAL_TOP_K: "50"
      RERANK_TOP_K: "20"
      CONTEXT_TOP_K: "6"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    networks: [backend]
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: ../../workers/ingestion
      dockerfile: Dockerfile.prod
    image: rag-platform/worker:latest
    container_name: rag_worker
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"
      EMBEDDING_PROVIDER: voyage
      EMBEDDING_MODEL: ${VOYAGE_EMBEDDING_MODEL:-voyage-3}
      EMBEDDING_DIM: "1024"
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      CHUNK_CHILD_TOKENS: "220"
      CHUNK_CHILD_OVERLAP: "40"
      CHUNK_PARENT_TOKENS: "1000"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CELERY_CONCURRENCY: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    networks: [backend]
    deploy:
      resources:
        limits:
          memory: 768M

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    image: rag-platform/web:latest
    container_name: rag_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks: [backend]
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    container_name: rag_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-rag.marinenationale.cloud}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - api
      - web
    networks: [backend]
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  caddy_data:
  caddy_config:
